version: '3.8'

services:
  # ParisCred AI Backend
  app:
    build: .
    container_name: pariscred-ai
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=pc_2025_pariscred_production
      - DATABASE_PATH=pariscred.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=CONSIGNADO123
      - EVOLUTION_INSTANCE_NAME=Paris_01
      - MAX_MSGS_POR_HORA=30
      - MIN_INTERVALO=20
      - CORS_ORIGINS=*
    volumes:
      - ./pariscred.db:/app/pariscred.db
      - ./logs:/app/logs
    depends_on:
      - evolution
    restart: unless-stopped

  # Evolution API for WhatsApp
  evolution:
    image: atendefi/evolution-api:latest
    container_name: evolution-pariscred
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=CONSIGNADO123
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: pariscred-postgres
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pariscred-redis
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: pariscred-network