<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParisCred Intelligence - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 450px;
            width: 100%;
        }
        
        .logo-area {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }
        
        .logo-subtitle {
            font-size: 14px;
            color: #999;
        }
        
        form {
            gap: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .erro {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            border-left: 4px solid #c33;
        }
        
        button {
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info-box {
            background: #f0f4ff;
            border: 1px solid #dde5ff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 30px;
            font-size: 13px;
            color: #666;
        }
        
        .info-box strong {
            display: block;
            color: #333;
            margin-bottom: 10px;
        }
        
        .cred {
            font-family: monospace;
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 5px 0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo">🚀</div>
            <div class="logo-text">ParisCred Intelligence</div>
            <div class="logo-subtitle">Sistema de Inteligência Financeira</div>
        </div>
        
        {% if erro %}
        <div class="erro">
            ⚠️ {{ erro }}
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com" autofocus>
            </div>
            
            <div class="form-group">
                <label for="senha">🔐 Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Sua senha">
            </div>
            
            <button type="submit">🔓 ACESSAR SISTEMA</button>
        </form>
        
        <div class="info-box">
            <strong>📝 Contas de Acesso:</strong>
            <div class="cred">
                <strong>Administrador:</strong><br>
                Email: admin@pariscred.com<br>
                Senha: Admin@2025
            </div>
            <div class="cred" style="margin-top: 8px;">
                <strong>Vendedor:</strong><br>
                Email: vendedor1@pariscred.com<br>
                Senha: Vendedor@123
            </div>
        </div>
    </div>
</body>
</html>
