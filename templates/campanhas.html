<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campanhas - ParisCred Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
        }
        
        .sidebar-logo {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .nav-group {
            margin-bottom: 30px;
        }
        
        .nav-title {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .nav-item.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }
        
        .user-section {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
            margin-top: 30px;
        }
        
        .user-info {
            margin-bottom: 15px;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-role {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 3px;
        }
        
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #333;
        }
        
        .btn-novo {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .btn-novo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .campanhas-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .campanhas-list {
            display: grid;
            gap: 15px;
        }
        
        .campanha-card {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .campanha-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .campanha-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .campanha-titulo {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .campanha-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-rascunho {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-ativo {
            background: #d4edda;
            color: #155724;
        }
        
        .status-disparado {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .campanha-desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .campanha-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #666;
            flex-wrap: wrap;
        }
        
        .campanha-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }
        
        .btn-small {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-small:hover {
            background: #f5f5f5;
        }
        
        .btn-disparar {
            background: #28a745;
            color: white;
            border: none;
        }
        
        .btn-disparar:hover {
            background: #218838;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input, textarea, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .beneficiarios-input {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .beneficiario-item {
            display: flex;
            gap: 10px;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
        }
        
        .beneficiario-item input {
            flex: 1;
            margin-bottom: 0;
        }
        
        .btn-remove {
            padding: 8px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-add {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn-cancel {
            padding: 12px 24px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-submit {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-logo">🚀</div>
            <div class="sidebar-title">ParisCred Intelligence</div>
            
            <div class="nav-group">
                <div class="nav-title">Menu</div>
                <a href="/dashboard" class="nav-item">📊 Dashboard</a>
                <a href="/campanhas" class="nav-item active">📧 Campanhas</a>
                <a href="/crm" class="nav-item">👥 CRM</a>
                <a href="/financeiro" class="nav-item">💰 Financeiro</a>
                <a href="/importar" class="nav-item">📊 Importar Leads</a>
                <a href="/coach" class="nav-item">🤖 Chat IA Coach</a>
                <a href="/extrato" class="nav-item">📄 Análise Extrato</a>
            </div>
            
            <div class="nav-group" id="admin-menu" style="display:none;">
                <div class="nav-title">Administração</div>
                <a href="/admin" class="nav-item">⚙️ Painel ADM</a>
            </div>
            
            <div class="user-section">
                <div class="user-info">
                    <div class="user-name" id="user-name">Carregando...</div>
                    <div class="user-role" id="user-role">Loading...</div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 Sair</button>
            </div>
        </div>
        
        <div class="main">
            <div class="header">
                <h1>📧 Campanhas</h1>
                <button class="btn-novo" onclick="abrirModal()">+ Nova Campanha</button>
            </div>
            
            <div class="campanhas-container">
                <div class="campanhas-list" id="campanhas-list">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>Nenhuma campanha criada</p>
                        <p style="font-size: 12px; margin-top: 10px; color: #666;">Clique em "+ Nova Campanha" para começar</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Nova Campanha -->
    <div class="modal" id="modal-campanha">
        <div class="modal-content">
            <div class="modal-header">➕ Nova Campanha</div>
            
            <form onsubmit="salvarCampanha(event)">
                <div class="form-group">
                    <label for="nome">Nome da Campanha *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Campanha Q1 2025">
                </div>
                
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" name="descricao" placeholder="Descreva a campanha"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Beneficiários *</label>
                    <div class="beneficiarios-input" id="beneficiarios-list">
                        <div class="beneficiario-item">
                            <input type="text" placeholder="Nome" class="benef-nome">
                            <input type="tel" placeholder="Telefone (11999999999)" class="benef-numero">
                            <button type="button" class="btn-remove" onclick="removerBeneficiario(this)">✕</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="adicionarBeneficiario()">+ Adicionar Beneficiário</button>
                </div>
                
                <div class="form-group">
                    <label for="mensagem">Mensagem *</label>
                    <textarea id="mensagem" name="mensagem" required placeholder="Digite a mensagem para seus clientes" style="min-height: 80px;"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="instancia">Instância WhatsApp *</label>
                    <select id="instancia" name="instancia" required>
                        <option value="">Selecione uma instância</option>
                        <option value="Paris_01">Paris_01</option>
                        <option value="Chip01">Chip01</option>
                        <option value="Chip02">Chip02</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-submit">💾 Salvar Campanha</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Carrega usuário
        fetch('/api/usuario')
            .then(r => r.json())
            .then(user => {
                document.getElementById('user-name').textContent = user.nome;
                document.getElementById('user-role').textContent = user.role === 'admin' ? '👑 Administrador' : '📱 Vendedor';
                
                if (user.role === 'admin') {
                    document.getElementById('admin-menu').style.display = 'block';
                }
            });
        
        // Carrega campanhas
        function carregarCampanhas() {
            fetch('/api/campanhas')
                .then(r => r.json())
                .then(campanhas => {
                    const container = document.getElementById('campanhas-list');
                    
                    if (campanhas.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">📭</div>
                                <p>Nenhuma campanha criada</p>
                                <p style="font-size: 12px; margin-top: 10px; color: #666;">Clique em "+ Nova Campanha" para começar</p>
                            </div>
                        `;
                        return;
                    }
                    
                    container.innerHTML = campanhas.map(camp => `
                        <div class="campanha-card">
                            <div class="campanha-header">
                                <div class="campanha-titulo">${camp.nome}</div>
                                <div class="campanha-status status-${camp.status}">${camp.status.toUpperCase()}</div>
                            </div>
                            <div class="campanha-desc">${camp.descricao}</div>
                            <div class="campanha-info">
                                <span>👥 ${camp.beneficiarios.length} beneficiários</span>
                                <span>📤 ${camp.total_enviados} enviados</span>
                                <span>📱 ${camp.instancias[0]}</span>
                                <span>📅 ${new Date(camp.criado_em).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <div class="campanha-actions">
                                <button class="btn-small" onclick="editarCampanha('${camp.id}')">✏️ Editar</button>
                                <button class="btn-small" onclick="vizualizarCampanha('${camp.id}')">👁️ Visualizar</button>
                                ${camp.status === 'rascunho' ? `<button class="btn-small btn-disparar" onclick="dispararCampanha('${camp.id}')">⚡ DISPARAR</button>` : ''}
                                <button class="btn-small" style="background: #dc3545; color: white; border: none;" onclick="deletarCampanha('${camp.id}')">🗑️ Deletar</button>
                            </div>
                        </div>
                    `).join('');
                });
        }
        
        carregarCampanhas();
        
        function abrirModal() {
            document.getElementById('modal-campanha').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('modal-campanha').classList.remove('active');
        }
        
        function adicionarBeneficiario() {
            const list = document.getElementById('beneficiarios-list');
            const item = document.createElement('div');
            item.className = 'beneficiario-item';
            item.innerHTML = `
                <input type="text" placeholder="Nome" class="benef-nome">
                <input type="tel" placeholder="Telefone (11999999999)" class="benef-numero">
                <button type="button" class="btn-remove" onclick="removerBeneficiario(this)">✕</button>
            `;
            list.appendChild(item);
        }
        
        function removerBeneficiario(btn) {
            btn.parentElement.remove();
        }
        
        function salvarCampanha(e) {
            e.preventDefault();
            
            const beneficiarios = Array.from(document.querySelectorAll('.beneficiario-item')).map(item => ({
                nome: item.querySelector('.benef-nome').value,
                numero: item.querySelector('.benef-numero').value
            })).filter(b => b.nome && b.numero);
            
            const dados = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                beneficiarios: beneficiarios,
                mensagem: document.getElementById('mensagem').value,
                instancias: [document.getElementById('instancia').value]
            };
            
            fetch('/api/campanhas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            })
            .then(r => r.json())
            .then(data => {
                if (data.sucesso) {
                    alert(data.mensagem);
                    fecharModal();
                    carregarCampanhas();
                    document.querySelector('form').reset();
                } else {
                    alert('Erro: ' + data.erro);
                }
            });
        }
        
        function dispararCampanha(id) {
            if (confirm('⚡ Tem certeza que deseja disparar esta campanha agora?')) {
                fetch(`/api/campanhas/${id}/disparar`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.sucesso) {
                            alert(data.mensagem + '\n\n' + data.resultados.map(r => `${r.beneficiario}: ${r.status}`).join('\n'));
                            carregarCampanhas();
                        } else {
                            alert('Erro: ' + data.erro);
                        }
                    });
            }
        }
        
        function editarCampanha(id) {
            alert('Editar em desenvolvimento');
        }
        
        function vizualizarCampanha(id) {
            alert('Visualizar em desenvolvimento');
        }
        
        function deletarCampanha(id) {
            if (confirm('Tem certeza que deseja deletar esta campanha?')) {
                fetch(`/api/campanhas/${id}`, { method: 'DELETE' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.sucesso) {
                            alert(data.mensagem);
                            carregarCampanhas();
                        } else {
                            alert('Erro: ' + data.erro);
                        }
                    });
            }
        }
        
        function logout() {
            window.location = '/logout';
        }
    </script>
</body>
</html>
