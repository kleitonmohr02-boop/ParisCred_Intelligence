services:
  - type: web
    name: pariscred-intelligence
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py
      - key: SECRET_KEY
        value: pc_2025_pariscred_secure_key_xyz123
      - key: DATABASE_PATH
        value: app.db
      - key: DATABASE_URL
        value: ""
      - key: LOG_LEVEL
        value: INFO
      - key: GEMINI_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: "https://pariscred-intelligence.onrender.com"
