services:
  - type: web
    name: pariscred-intelligence
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_novo:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
